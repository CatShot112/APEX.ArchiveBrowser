name: Create Pre-Release

on:
  push:
    tags:
      - "v0.*.*"

env:
  SOLUTION_FILE_PATH: "C++\APEX.ArchiveBrowser.sln"

permissions: write-all

jobs:
  build:
    if: ${{startsWith(github.ref, 'refs/tags/v0.')}}
    runs-on: window-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download SDL3
      run: iwr -Uri "https://github.com/libsdl-org/SDL/releases/download/release-3.4.0/SDL3-3.4.0-win32-x64.zip" -OutFile "SDL3.zip"

    - name: Extract SDL3
      run: 7z x SDL3.zip -oSDL3

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Release
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=Release /p:Platform=x64 ${{env.SOLUTION_FILE_PATH}}

    - name: Copy files to Release
      run: |
        xcopy /f /i "SDL3\SDL3.dll" "C++\Out\Release\"
        xcopy /f /i "C++\Props.txt" "C++\Out\Release\"
        xcopy /f /i "C++\VPaths.txt" "C++\Out\Release\"
        xcopy /f /i "C++\LayoutDefault.ini" "C++\Out\Release\"

    - name: Create archive
      run: 7z a -bb1 -mx9 "APEX.ArchiveBrowser_${{github.ref_name}}.zip" "./C++/Out/Release/*.*"

    - name: Publish Pre-Release
      if: ${{startsWith(github.ref, 'refs/tags/v0.')}}
      uses: ncipollo/release-action@v1
      with:
        name: "APEX.ArchiveBrowser ${{github.ref_name}}"
        prerelease: true
        artifacts: "APEX.ArchiveBrowser_${{github.ref_name}}.zip"
